name: development
type: development
description: "General software development workflow — analysis, implementation, review"
decomposition: flat
execution: sequential
max_parallel: 1
retry_on_failure: false
retry_max: 0
agents:
  allowed: ["developer", "analista"]
stages:
  task_analysis: true
  task_decomposition: true
  supervisor_review: true
  result_aggregation: true
  finalization: true
tools:
  allowed: ["file_manager", "git_manager", "bash_manager", "lsp_manager", "code_exec", "test_runner", "diff_editor", "web_search", "web_fetch"]
project:
  required: false
