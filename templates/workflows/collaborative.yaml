name: collaborative
type: collaborative
description: "Multi-agent panel debate to reach consensus on complex decisions"
decomposition: panel
execution: parallel_rounds
max_parallel: 2
rounds: 3
round_timeout: 300
retry_on_failure: false
retry_max: 0
moderator: "moderador"
panel:
  - "developer"
  - "analista"
agents:
  allowed: ["developer", "analista", "moderador"]
tools:
  allowed:
    - "file_manager"
    - "code_search"
    - "web_search"
    - "web_fetch"
    - "lsp_manager"
project:
  required: false
stages:
  panel_discussion: true
  moderator_synthesis: true
  result_aggregation: true
  finalization: true
